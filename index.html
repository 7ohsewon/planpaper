<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>기안문 자동 생성</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.js"></script>
    <script>
      stlite.mount(
        {
          requirements: ["streamlit", "anthropic", "openai", "pdfplumber", "python-docx", "lxml"],
          entrypoint: "app.py",
          files: {
            "app.py": {
              url: "app.py",
            },
            "draft.py": {
              url: "draft.py",
            },
            "extractor.py": {
              url: "extractor.py",
            },
            "hwpx_writer.py": {
              url: "hwpx_writer.py",
            },
            "기안문.hwpx": {
              url: "기안문.hwpx",
            }
          },
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
